name: Deploy Storybook Preview

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Storybook
      run: npm run build-storybook
      
    - name: Deploy to GitHub Pages (main branch)
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./storybook-static
        force_orphan: true  # Don't preserve git commit history to save space
        
    - name: Deploy Preview (PRs)
      if: github.event_name == 'pull_request'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./storybook-static
        destination_dir: preview/pr-${{ github.event.number }}
        force_orphan: true  # Don't preserve git commit history to save space
        keep_files: false   # Completely replace existing files, don't keep old versions
        
    - name: Find Previous Comment
      if: github.event_name == 'pull_request'
      uses: peter-evans/find-comment@v3
      id: find-comment
      with:
        issue-number: ${{ github.event.number }}
        comment-author: 'github-actions[bot]'
        body-includes: 'Storybook Preview'
        
    - name: Create or Update Preview Comment
      if: github.event_name == 'pull_request'
      uses: peter-evans/create-or-update-comment@v4
      with:
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        issue-number: ${{ github.event.number }}
        edit-mode: replace
        body: |
          ## 🎨 Storybook Preview Ready!
          
          Your Storybook preview has been deployed and is available at:
          
          **🔗 Preview URL:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/pr-${{ github.event.number }}/
          
          ### 📝 What's included:
          - All components from this PR
          - Interactive component playground
          - Documentation and examples
          
          > 💡 This preview updates automatically when you push new commits to this PR.
          > 
          > 🗑️ Preview will be cleaned up when the PR is merged or closed.;